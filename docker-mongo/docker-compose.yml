services:
  mongo:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: YourStrongPassword123!  # Change to a strong password
    ports:
      - 27017:27017
    volumes:
      - mongodb_data_container:/data/db

  mongo-express:
    image: mongo-express:latest
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: YourStrongPassword123!  # Change to a strong password
      ME_CONFIG_MONGODB_URL: mongodb://root:YourStrongPassword123!@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - 8081:8081
    depends_on:
      - mongo

  mongo-tools:
    image: mongo:latest
    command: sleep infinity
    environment:
      MONGO_HOST: mongo
      MONGO_USERNAME: root
      MONGO_PASSWORD: YourStrongPassword123!  # Change to a strong password
    depends_on:
      - mongo
    volumes:
      - ./data:/backups
      - ./scripts:/scripts

volumes:
  mongodb_data_container: