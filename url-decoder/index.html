<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder and Decoder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }
        button {
            margin-right: 10px;
        }
        .output {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>URL Encoder and Decoder</h1>
    <textarea id="inputText" placeholder="Enter text here..."></textarea>
    <br>
    <button onclick="encodeText()">Encode</button>
    <button onclick="decodeText()">Decode</button>
    <button onclick="clearFields()">Clear</button>
    <div class="output">
        <strong>Result:</strong>
        <p id="outputText"></p>
    </div>

    <script>
        function encodeText() {
            const input = document.getElementById('inputText').value;
            const encoded = encodeURIComponent(input);
            document.getElementById('outputText').textContent = encoded;
        }

        function decodeText() {
            const input = document.getElementById('inputText').value;
            try {
                const decoded = decodeURIComponent(input);
                document.getElementById('outputText').textContent = decoded;
            } catch (e) {
                document.getElementById('outputText').textContent = 'Error: The entered text is not encoded correctly.';
            }
        }

        function clearFields() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').textContent = '';
        }
    </script>
</body>
</html>
