services:

  sqlserver-express:
    container_name: sqlserver-express
    image: mcr.microsoft.com/mssql/server:latest
    ports:
      - 1433:1433
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrengPassword123!  # Change this to a strong password
      - MSSQL_PID=Express
    volumes:
      - //c/mounts/sql:/var/opt/mssql/data
      
