<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Converters</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div>
        <h2>Base64 Encoder and Decoder</h2>
        <textarea id="inputText" placeholder="Enter text here..."></textarea>
        <div>
            <button onclick="encodeBase64()">Encode to Base64</button>
            <button onclick="decodeBase64()">Decode from Base64</button>
        </div>
        <textarea id="outputText" placeholder="Result..."></textarea>

        <script>
            function encodeBase64() {
                const inputText = document.getElementById("inputText").value;
                const encodedText = btoa(inputText);
                document.getElementById("outputText").value = encodedText;
            }

            function decodeBase64() {
                try {
                    const inputText = document.getElementById("inputText").value;
                    const decodedText = atob(inputText);
                    document.getElementById("outputText").value = decodedText;
                } catch (e) {
                    document.getElementById("outputText").value = "Error: Invalid Base64 string";
                }
            }
        </script>
    </div>
    <div>
        <h2>Decode Base64 to Image</h2>
        <input id="mimeTypeInput" type="text"  value="image/png" />
        <textarea id="base64Input" placeholder="Enter Base64 string here" rows="10" cols="50"></textarea>
        <br><br>
        <button onclick="decodeBase64()">Show Image</button>
        <br><br>
        <img id="outputImage" alt="Decoded image" style="max-width: 100%; border: 1px solid #ccc;">
        
        <script>
            function decodeBase64() {
                const base64String = document.getElementById("base64Input").value.trim();
                const mimeType = document.getElementById("mimeTypeInput").value.trim();

                if (base64String) {
                    const imgElement = document.getElementById("outputImage");
                    imgElement.src = "data:"+ mimeType +";base64," + base64String;
                } else {
                    alert("Please enter a valid Base64 string.");
                }
            }
        </script>
    </div>
</body>
</html>
